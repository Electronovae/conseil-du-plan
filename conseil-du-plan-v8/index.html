<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conseil du Plan</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<body>

<!-- HEADER -->
<header id="header">
  <div id="header-inner">
    <div id="logo">
      <div id="logo-icon">🌀</div>
      <div>
        <div id="logo-title">CONSEIL DU PLAN</div>
        <div id="logo-sub">Nexus des Planeswalkers</div>
      </div>
    </div>
    <nav>
      <button class="nav-btn active" data-module="members" onclick="switchModule('members',this)">⚔️ Aventuriers</button>
      <button class="nav-btn" data-module="inventory" onclick="switchModule('inventory',this)">⚖️ Inventaire</button>
      <button class="nav-btn" data-module="adventure" onclick="switchModule('adventure',this)">📖 Aventure</button>
      <button class="nav-btn" data-module="battlemap" onclick="switchModule('battlemap',this)">🗺️ Battlemaps</button>
      <button class="nav-btn" data-module="media" onclick="switchModule('media',this)">🎵 Médias</button>
      <button class="nav-btn" data-module="bestiary" onclick="switchModule('bestiary',this)">🐉 Bestiaire</button>
      <button class="nav-btn" onclick="openPlanesModal()" style="font-size:11px" title="Gérer les noms de plans">🌀 Plans</button>
    </nav>
    <div id="stats">
      <div class="stat"><div class="stat-v" id="stat-members" style="color:var(--green)">0</div><div class="stat-l">Membres</div></div>
      <div class="stat"><div class="stat-v" id="stat-items" style="color:var(--gold)">0 PO</div><div class="stat-l">Richesse PO</div></div>
      <div class="stat"><div class="stat-v" id="stat-logs" style="color:var(--blue)">0</div><div class="stat-l">Aventures</div></div>
      <div style="display:flex;flex-direction:column;gap:3px;border-left:1px solid var(--border);padding-left:16px">
        <button class="btn btn-ghost btn-xs" onclick="exportData()" title="Exporter toutes les données en JSON" style="font-size:10px;white-space:nowrap">💾 Exporter</button>
        <button class="btn btn-ghost btn-xs" onclick="importData()" title="Importer un fichier de sauvegarde JSON" style="font-size:10px;white-space:nowrap">📂 Importer</button>
      </div>
      <button onclick="toggleTheme()" id="theme-btn" title="Basculer mode clair/sombre"
        style="background:none;border:1px solid var(--border2);border-radius:8px;cursor:pointer;padding:6px 10px;font-size:16px;color:var(--text);transition:all .2s;margin-left:4px">🌙</button>
    </div>
  </div>
</header>

<main id="main">
  <div id="module-members" class="module"></div>
  <div id="module-inventory" class="module" style="display:none"></div>
  <div id="module-battlemap" class="module" style="display:none"></div>
  <div id="module-media" class="module" style="display:none"></div>
  <div id="module-adventure" class="module" style="display:none"></div>
  <div id="module-bestiary" class="module" style="display:none"></div>
</main>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>
<div id="toast"></div>


    <!-- JS Modules (ordre important !) -->
    <script src="js/core/constants.js"></script>
    <script src="js/data/data-store.js"></script>
    <script src="js/core/db.js"></script>
    <script src="js/core/toast.js"></script>
    <script src="js/core/modal.js"></script>
    <script src="js/core/app.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/modules/aventuriers.js"></script>
    <script src="js/modules/member-modal.js"></script>
    <script src="js/modules/member-spells.js"></script>
    <script src="js/modules/member-inventory.js"></script>
    <script src="js/modules/member-save.js"></script>
    <script src="js/modules/member-resources.js"></script>
    <script src="js/modules/inventaire.js"></script>
    <script src="js/modules/journal.js"></script>
    <script src="js/modules/pnj.js"></script>
    <script src="js/modules/battlemaps.js"></script>
    <script src="js/modules/medias.js"></script>
    <script src="js/modules/bestiaire.js"></script>
    <script src="js/data/spells-aidedd.js"></script>
    <script src="js/modules/tresors.js"></script>
    <script src="js/modules/chasse.js"></script>
    <script src="js/modules/aventure.js"></script>
    <script src="js/core/export-import.js"></script>
    <script src="js/core/init.js"></script>
</body>
</html>
